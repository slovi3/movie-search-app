<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Search App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow glow-left"></div>
  <div class="bg-glow glow-right"></div>
  <div class="bg-grid"></div>

  <main class="container">
    <section class="hero">
      <div class="hero-copy">
        <h1>Movie Search App</h1>
        <p>
          Film ara, posterları incele ve IMDb puanını gör. Daha derli toplu,
          sinematik ve portföylük bir sürüm.
        </p>

        <div class="hero-stats">
          <div class="stat">
            <span>Arama</span>
            <strong>Hızlı Sonuç</strong>
          </div>
          <div class="stat">
            <span>Tema</span>
            <strong>Cinematic UI</strong>
          </div>
          <div class="stat">
            <span>API</span>
            <strong>OMDb</strong>
          </div>
        </div>
      </div>

      <div class="hero-panel">
        <div class="hero-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="1.8"></circle>
            <path d="M16 16L21 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
          </svg>
        </div>

        <form id="searchForm" class="search-box">
          <div class="input-wrap">
            <input
              type="text"
              id="searchInput"
              placeholder="Film adı yaz... örnek: Interstellar"
              autocomplete="off"
            />
          </div>
          <button type="submit" class="search-btn">Ara</button>
        </form>
      </div>
    </section>

    <section class="results">
      <div class="results-header">
        <div>
          <p class="eyebrow">Search Results</p>
          <h2 id="resultsTitle">Aramak için bir film adı yaz</h2>
        </div>
        <button id="clearBtn" class="ghost-btn" type="button">Temizle</button>
      </div>

      <div id="statusBox" class="status info">
        Film araması yapmaya hazırsın.
      </div>

      <div id="moviesGrid" class="movies-grid"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
